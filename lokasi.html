<!DOCTYPE html>
<html>
<head>
    <title>Test Validasi Lokasi Rumah</title>
</head>
<body>

<h2>Test Absen Lokasi Rumah</h2>
<button onclick="cekLokasi()">Cek Lokasi Saya</button>
<p id="hasil"></p>

<script>

// GANTI DENGAN KOORDINAT RUMAH KAMU -6.510843342916951, 106.81048352025849
const homeLat = -6.510843342916951;
const homeLon = 106.81048352025849;
const radius = 50; // meter (rumah kecil cukup 30-50m)

// Fungsi hitung jarak
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;
    const Δφ = (lat2-lat1) * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;

    const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
              Math.cos(φ1) * Math.cos(φ2) *
              Math.sin(Δλ/2) * Math.sin(Δλ/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}

function cekLokasi() {

    navigator.geolocation.getCurrentPosition(function(position) {

        const userLat = position.coords.latitude;
        const userLon = position.coords.longitude;

        const distance = getDistance(userLat, userLon, homeLat, homeLon);

        if (distance <= radius) {
            document.getElementById("hasil").innerHTML =
                "✅ Kamu berada di rumah! (" + Math.round(distance) + " meter)";
        } else {
            document.getElementById("hasil").innerHTML =
                "❌ Kamu tidak berada di rumah! (" + Math.round(distance) + " meter)";
        }

    }, function() {
        alert("Izinkan akses lokasi dulu ya!");
    });
}

</script>

</body>
</html>
